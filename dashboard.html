<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PulseAlert — Live ICU Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f1f5f9;color:#1e293b;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.header h1{font-size:22px}
.live-badge{display:flex;align-items:center;gap:6px;background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.live-badge.connected{background:#f0fdf4;color:#15803d;border-color:#86efac}
.dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 1.5s infinite}
.dot.on{background:#22c55e}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.box{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #ddd;max-width:1000px}
input[type=file]{margin:10px 0}
button{background:#3b82f6;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-right:8px}
button:disabled{background:#cbd5e1;cursor:not-allowed}
.btn-pause{background:#f59e0b}
.btn-reset{background:#64748b}
.btn-report{background:#22c55e}

.progress-row{display:flex;align-items:center;gap:12px;margin-top:14px}
.progress-bar-bg{flex:1;background:#f1f5f9;border-radius:6px;height:10px;overflow:hidden}
.progress-bar-fill{height:10px;background:linear-gradient(90deg,#3b82f6,#2563eb);border-radius:6px;transition:width .5s ease;width:0%}
.progress-text{font-size:13px;color:#64748b;min-width:90px}

.patient-card{display:none}
.pc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pc-name{font-size:18px;font-weight:700}
.pc-meta{font-size:12px;color:#94a3b8;margin-top:3px}
.badge{padding:6px 16px;border-radius:18px;font-size:13px;font-weight:700}
.b-CRITICAL{background:#fef2f2;color:#dc2626;border:1.5px solid #fca5a5}
.b-HIGH{background:#fff7ed;color:#c2410c;border:1.5px solid #fdba74}
.b-MEDIUM{background:#fefce8;color:#a16207;border:1.5px solid #fde047}
.b-LOW{background:#f0fdf4;color:#15803d;border:1.5px solid #86efac}

.risk-row{display:flex;align-items:center;gap:18px;margin-bottom:12px}
.risk-num{font-size:46px;font-weight:800}
.rn-CRITICAL{color:#dc2626}.rn-HIGH{color:#ea580c}.rn-MEDIUM{color:#ca8a04}.rn-LOW{color:#16a34a}
.risk-bar-bg{flex:1;background:#f1f5f9;border-radius:8px;height:10px;overflow:hidden}
.risk-bar-fill{height:10px;border-radius:8px;transition:width 1s ease}
.rb-CRITICAL{background:#ef4444}.rb-HIGH{background:#f97316}.rb-MEDIUM{background:#eab308}.rb-LOW{background:#22c55e}

.action-box{margin-top:10px;padding:12px 14px;border-radius:9px;font-size:13px;font-weight:500}
.ab-CRITICAL{background:#fef2f2;color:#dc2626;border-left:3px solid #ef4444}
.ab-HIGH{background:#fff7ed;color:#c2410c;border-left:3px solid #f97316}
.ab-MEDIUM{background:#fefce8;color:#a16207;border-left:3px solid #eab308}
.ab-LOW{background:#f0fdf4;color:#15803d;border-left:3px solid #22c55e}

.vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.vbox{background:#f8fafc;border-radius:9px;padding:12px 14px;border:1px solid #f1f5f9}
.vbox.danger{background:#fef2f2;border-color:#fca5a5}
.vbox.warn{background:#fff7ed;border-color:#fdba74}
.vbox-lbl{font-size:10px;color:#94a3b8;margin-bottom:3px}
.vbox-val{font-size:18px;font-weight:700}
.vbox.danger .vbox-val{color:#dc2626}
.vbox.warn .vbox-val{color:#c2410c}

.chart-wrap{height:200px;margin-top:16px}

.section-label{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px}

.factor-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.factor-row:last-child{border-bottom:none}
.factor-name{flex:1;color:#374151}
.factor-val{color:#94a3b8}
.factor-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.fp-HIGH{background:#fef2f2;color:#dc2626}
.fp-MEDIUM{background:#fff7ed;color:#c2410c}
.fp-LOW{background:#f0fdf4;color:#15803d}

.summary-text{font-size:13px;color:#64748b;line-height:1.7;margin-top:10px;background:#f8fafc;padding:12px;border-radius:8px}

.alert-log{max-height:200px;overflow-y:auto;margin-top:10px}
.log-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}
</style>
</head>
<body>

<div class="header">
  <h1>🚨 PulseAlert — Live ICU Monitor</h1>
  <div class="live-badge" id="wsBadge"><div class="dot" id="wsDot"></div><span id="wsLabel">Connecting...</span></div>
</div>

<div class="box">
  <h3>Load Patient for Live Monitoring</h3>
  <p style="font-size:13px;color:#94a3b8;margin:6px 0">Upload a CSV with multiple time-point readings for ONE patient. System will replay readings automatically.</p>
  <input type="file" id="fileInput" accept=".csv">
  <br>
  <button onclick="loadPlayer()" id="loadBtn">Load & Start Monitoring</button>
  <button class="btn-pause" onclick="pausePlayer()" id="pauseBtn" disabled>Pause</button>
  <button onclick="resumePlayer()" id="resumeBtn" disabled>Resume</button>
  <button class="btn-reset" onclick="resetPlayer()" id="resetBtn" disabled>Reset</button>
  <p id="status" style="margin-top:10px;font-size:13px;color:#64748b"></p>

  <div class="progress-row" id="progressRow" style="display:none">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Reading 0 / 0</div>
  </div>
</div>

<div class="box patient-card" id="patientCard">
  <div class="pc-header">
    <div>
      <div class="pc-name" id="pcName">—</div>
      <div class="pc-meta" id="pcMeta">—</div>
    </div>
    <div class="badge" id="pcBadge">—</div>
  </div>

  <div class="risk-row">
    <div class="risk-num" id="riskNum">—</div>
    <div style="flex:1">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">Deterioration Risk Score</div>
      <div class="risk-bar-bg"><div class="risk-bar-fill" id="riskBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="action-box" id="actionBox"></div>

  <div class="vitals-grid" id="vitalsGrid"></div>

  <div class="chart-wrap"><canvas id="trendChart"></canvas></div>

  <div class="section-label">Top Risk Factors (SHAP)</div>
  <div id="factorsBox"></div>

  <div class="summary-text" id="summaryText"></div>

  <button class="btn-report" onclick="downloadReport()" id="reportBtn" style="margin-top:16px">📄 Download PDF Report</button>
</div>

<div class="box" id="alertLogBox" style="display:none">
  <h3>Alert Log</h3>
  <div class="alert-log" id="alertLog"></div>
</div>

<script>
let ws = null
let chart = null
let lastPatientId = null
const chartData = { labels: [], scores: [] }
const alertLog = []
const levelColors = {CRITICAL:'#dc2626',HIGH:'#f97316',MEDIUM:'#eab308',LOW:'#22c55e'}

function connectWS(){
  ws = new WebSocket('ws://localhost:8000/ws')
  ws.onopen = () => {
    document.getElementById('wsBadge').classList.add('connected')
    document.getElementById('wsDot').classList.add('on')
    document.getElementById('wsLabel').textContent = 'Live'
  }
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data)
    if(d.type === 'patient_update' && d.reading_number !== undefined){
      renderPatient(d)
    }
  }
  ws.onclose = () => {
    document.getElementById('wsBadge').classList.remove('connected')
    document.getElementById('wsDot').classList.remove('on')
    document.getElementById('wsLabel').textContent = 'Reconnecting...'
    setTimeout(connectWS, 3000)
  }
}

function vClass(key, val){
  if(key==='spo2' && val<90) return 'danger'
  if(key==='spo2' && val<94) return 'warn'
  if(key==='systolic_bp' && val<90) return 'danger'
  if(key==='systolic_bp' && val<100) return 'warn'
  if(key==='lactate' && val>4) return 'danger'
  if(key==='lactate' && val>2) return 'warn'
  if(key==='heart_rate' && val>120) return 'danger'
  if(key==='heart_rate' && val>100) return 'warn'
  return ''
}

function renderPatient(d){
  document.getElementById('patientCard').style.display = 'block'
  document.getElementById('alertLogBox').style.display = 'block'
  lastPatientId = d.patient_id

  const lvl = d.risk_level
  const sc = Math.round(d.risk_score * 100)
  const v = d.vitals

  document.getElementById('pcName').textContent = d.patient_id
  document.getElementById('pcMeta').textContent = `Age ${d.age} · Reading ${d.reading_number} of ${d.total_readings} · ${d.alert ? '🔴 Alert Active' : '🟢 Monitoring'}`
  document.getElementById('pcBadge').textContent = lvl
  document.getElementById('pcBadge').className = 'badge b-' + lvl

  document.getElementById('riskNum').textContent = sc + '%'
  document.getElementById('riskNum').className = 'risk-num rn-' + lvl
  document.getElementById('riskBar').style.width = sc + '%'
  document.getElementById('riskBar').className = 'risk-bar-fill rb-' + lvl

  document.getElementById('actionBox').textContent = d.recommended_action
  document.getElementById('actionBox').className = 'action-box ab-' + lvl

  const vboxes = [
    {l:'Heart Rate', k:'heart_rate', v:v.heart_rate, u:'bpm'},
    {l:'Systolic BP', k:'systolic_bp', v:v.systolic_bp, u:'mmHg'},
    {l:'SpO2', k:'spo2', v:v.spo2, u:'%'},
    {l:'Lactate', k:'lactate', v:v.lactate, u:'mmol/L'},
    {l:'Resp Rate', k:'resp_rate', v:v.resp_rate, u:'/min'},
    {l:'Temperature', k:'temperature', v:v.temperature, u:'°C'}
  ].map(b => `
    <div class="vbox ${vClass(b.k, b.v)}">
      <div class="vbox-lbl">${b.l}</div>
      <div class="vbox-val">${b.v}<span style="font-size:10px;font-weight:400"> ${b.u}</span></div>
    </div>`).join('')
  document.getElementById('vitalsGrid').innerHTML = vboxes

  // SHAP factors
  const factors = d.top_risk_factors || []
  const factorsHtml = factors.map(f => `
    <div class="factor-row">
      <span class="factor-name">${f.feature.replace(/_/g,' ')}</span>
      <span class="factor-val">${f.value}</span>
      <span class="factor-pill fp-${f.impact}">${f.impact}</span>
    </div>`).join('')
  document.getElementById('factorsBox').innerHTML = factorsHtml || '<div style="font-size:12px;color:#94a3b8">No factor data available</div>'

  document.getElementById('summaryText').textContent = d.nurse_summary || ''

  // Progress bar
  const pct = Math.round((d.reading_number / d.total_readings) * 100)
  document.getElementById('progressFill').style.width = pct + '%'
  document.getElementById('progressText').textContent = `Reading ${d.reading_number} / ${d.total_readings}`

  // Chart
  chartData.labels.push(d.timestamp)
  chartData.scores.push(sc)
  updateChart()

  // Alert log
  if(d.alert){
    alertLog.unshift(d)
    if(alertLog.length > 15) alertLog.pop()
    document.getElementById('alertLog').innerHTML = alertLog.map(a => `
      <div class="log-item">
        <div class="log-dot" style="background:${levelColors[a.risk_level]}"></div>
        <div>
          <strong>${a.timestamp}</strong> — Risk ${Math.round(a.risk_score*100)}% [${a.risk_level}]<br>
          <span style="color:#94a3b8">${a.recommended_action}</span>
        </div>
      </div>`).join('')
  }

  if(d.reading_number >= d.total_readings){
    document.getElementById('status').textContent = 'Monitoring complete — all readings played.'
    document.getElementById('pauseBtn').disabled = true
    document.getElementById('resumeBtn').disabled = true
  }
}

function updateChart(){
  const ctx = document.getElementById('trendChart')
  if(chart) chart.destroy()
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartData.labels,
      datasets: [{
        label: 'Risk Score %',
        data: chartData.scores,
        borderColor: '#ef4444',
        backgroundColor: 'rgba(239,68,68,0.08)',
        borderWidth: 2,
        pointRadius: 3,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  })
}

async function loadPlayer(){
  const fileInput = document.getElementById('fileInput')
  if(!fileInput.files.length){
    alert('Please choose a CSV file first')
    return
  }

  document.getElementById('status').textContent = 'Loading patient data...'
  document.getElementById('loadBtn').disabled = true

  const formData = new FormData()
  formData.append('file', fileInput.files[0])

  try {
    const res = await fetch('http://localhost:8000/player/load', { method: 'POST', body: formData })
    const data = await res.json()

    if(!res.ok) throw new Error(data.detail || 'Load failed')

    document.getElementById('status').textContent =
      `Monitoring started for ${data.patient_id} — ${data.total_readings} readings, one every ${data.interval_seconds}s`
    document.getElementById('progressRow').style.display = 'flex'
    document.getElementById('progressText').textContent = `Reading 0 / ${data.total_readings}`
    document.getElementById('pauseBtn').disabled = false
    document.getElementById('resetBtn').disabled = false

    chartData.labels = []
    chartData.scores = []

  } catch(err){
    document.getElementById('status').textContent = 'Error: ' + err.message
    document.getElementById('loadBtn').disabled = false
  }
}

async function pausePlayer(){
  await fetch('http://localhost:8000/player/pause', { method: 'POST' })
  document.getElementById('pauseBtn').disabled = true
  document.getElementById('resumeBtn').disabled = false
  document.getElementById('status').textContent = 'Monitoring paused.'
}

async function resumePlayer(){
  await fetch('http://localhost:8000/player/resume', { method: 'POST' })
  document.getElementById('pauseBtn').disabled = false
  document.getElementById('resumeBtn').disabled = true
  document.getElementById('status').textContent = 'Monitoring resumed.'
}

async function resetPlayer(){
  await fetch('http://localhost:8000/player/reset', { method: 'POST' })
  document.getElementById('status').textContent = 'Player reset. Load a new CSV to start again.'
  document.getElementById('loadBtn').disabled = false
  document.getElementById('pauseBtn').disabled = true
  document.getElementById('resumeBtn').disabled = true
  document.getElementById('resetBtn').disabled = true
  document.getElementById('progressRow').style.display = 'none'
  document.getElementById('patientCard').style.display = 'none'
  chartData.labels = []
  chartData.scores = []
}

async function downloadReport(){
  if(!lastPatientId){
    alert('No patient data yet')
    return
  }
  const btn = document.getElementById('reportBtn')
  btn.disabled = true
  btn.textContent = 'Generating report...'

  try {
    const res = await fetch(`http://localhost:8000/report/${lastPatientId}`)
    if(!res.ok) throw new Error('Report generation failed')

    const blob = await res.blob()
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = `PulseAlert_Report_${lastPatientId}.pdf`
    a.click()
    URL.revokeObjectURL(url)
  } catch(err){
    alert('Error generating report: ' + err.message)
  } finally {
    btn.disabled = false
    btn.textContent = '📄 Download PDF Report'
  }
}

connectWS()
</script>

</body>
</html>
